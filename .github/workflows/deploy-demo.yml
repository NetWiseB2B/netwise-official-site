name: Deploy Site + Demo Store to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: demo-store/package-lock.json

      - name: Build demo store
        working-directory: demo-store
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Combine landing page + demo store
        run: |
          mkdir -p _site/demo
          # Copy landing page root files (everything except demo-store, node_modules, .git, .github)
          rsync -a --exclude='demo-store' --exclude='node_modules' --exclude='.git' --exclude='.github' --exclude='_site' . _site/
          # Copy demo store build into /demo/
          cp -r demo-store/dist/* _site/demo/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
